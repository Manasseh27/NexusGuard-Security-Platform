[pytest]
# Pytest configuration for NexusGuard tests

# Minimum version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    security: marks tests as security-related tests
    asyncio: marks tests as async tests

# Coverage options (if using pytest-cov)
# --cov=app
# --cov-report=html
# --cov-report=term-missing
# --cov-fail-under=80

# Timeout for tests (requires pytest-timeout)
timeout = 300

# Log configuration
log_cli = false
log_cli_level = INFO
log_file = tests/pytest.log
log_file_level = DEBUG

# Asyncio configuration
asyncio_mode = auto

# Test paths
testpaths = tests

# Ignore patterns
norecursedirs = .git .venv venv __pycache__ *.egg-info .pytest_cache

# Python executable (optional)
# python_classes = Test*
