apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cisco-security

resources:
  - ../../base/deployment.yaml
  - ../../base/rbac.yaml
  - ../../base/network-policies.yaml
  - ../../base/hpa.yaml
  - ../../base/ingress.yaml

images:
  - name: cisco-security-api
    newTag: "2.0.0"
  - name: cisco-security-frontend
    newTag: "2.0.0"

patches:
  # Production: 3 API replicas minimum
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: cisco-security-api

  # Production: tighter resource limits
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
    target:
      kind: Deployment
      name: cisco-security-api

configMapGenerator:
  - name: cisco-security-config
    literals:
      - ENVIRONMENT=production
      - SERVICE_NAME=cisco-security-platform
      - DEBUG=false
      - WORKERS=4
      - ENABLE_CONTINUOUS_MONITORING=true
      - ENABLE_AUTO_REMEDIATION=false

secretGenerator:
  - name: cisco-security-secrets
    envs:
      - secrets.env  # NOT committed — injected by CI/CD pipeline
