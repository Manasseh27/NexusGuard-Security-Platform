---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cisco-security-platform
  namespace: cisco-security
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # Security headers (supplement app-level headers)
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # CORS handled by application
    nginx.ingress.kubernetes.io/enable-cors: "false"
spec:
  tls:
    - hosts:
        - security.example.com
        - api.security.example.com
      secretName: cisco-security-tls
  rules:
    - host: api.security.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cisco-security-api
                port:
                  number: 8000
    - host: security.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cisco-security-frontend
                port:
                  number: 3000
