---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cisco-security-api
  namespace: cisco-security
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cisco-security-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cisco-security-worker-audit
  namespace: cisco-security
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cisco-security-worker-audit
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cisco-security-worker-network
  namespace: cisco-security
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cisco-security-worker-network
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
