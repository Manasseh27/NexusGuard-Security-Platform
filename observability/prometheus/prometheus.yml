global:
  scrape_interval:     30s
  evaluation_interval: 30s
  external_labels:
    cluster:     nexusguard-security
    environment: development

rule_files:
  - "alerts/*.yml"

scrape_configs:

  # ── Platform API ─────────────────────────────────────────────
  - job_name: nexusguard-security-api
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api
          component: backend
    metrics_path: /metrics
    scrape_interval: 15s

  # ── PostgreSQL exporter ───────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres

  # ── Redis exporter ────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis

  # ── OPA policy engine ─────────────────────────────────────────
  - job_name: opa
    static_configs:
      - targets: ["opa:8181"]
        labels:
          service: opa
    metrics_path: /metrics

  # ── Celery / Flower ───────────────────────────────────────────
  - job_name: celery-flower
    static_configs:
      - targets: ["flower:5555"]
        labels:
          service: celery

  # ── OTel Collector self-metrics ────────────────────────────────
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: otel-collector
