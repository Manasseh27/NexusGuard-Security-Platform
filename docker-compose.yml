---
# NexusGuard Security Platform — Local Development Docker Compose
# Usage:  docker compose up --build --pull never
# Health: docker compose ps

x-api-common: &api-common
  build:
    context: ./backend
    dockerfile: Dockerfile
    target: development
  env_file: .env
  volumes:
    - ./backend:/app
    - /app/__pycache__
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks: [platform]
  restart: unless-stopped

services:

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    <<: *api-common
    container_name: nexusguard-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8000"
      - "prometheus.path=/metrics"

  # ── Celery Workers (disabled for dev — enable when needed) ──────────────────
  # worker-audit:
  #   <<: *api-common
  #   container_name: nexusguard-worker-audit
  #   command: celery -A app.workers.celery_app worker -Q audit,default -c 4 --loglevel=info
  #   healthcheck:
  #     test: ["CMD", "celery", "-A", "app.workers.celery_app", "inspect", "ping"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # worker-compliance:
  #   <<: *api-common
  #   container_name: nexusguard-worker-compliance
  #   command: celery -A app.workers.celery_app worker -Q compliance,monitoring -c 2 --loglevel=info

  # worker-network:
  #   <<: *api-common
  #   container_name: nexusguard-worker-network
  #   command: celery -A app.workers.celery_app worker -Q network,remediation -c 8 --loglevel=info

  # celery-beat:
  #   <<: *api-common
  #   container_name: nexusguard-beat
  #   command: celery -A app.workers.celery_app beat --loglevel=info

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: nexusguard-frontend
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    networks: [platform]
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:latest
    container_name: nexusguard-postgres
    environment:
      POSTGRES_DB:       cisco_security
      POSTGRES_USER:     cisco_app
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword123}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cisco_app -d cisco_security"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [platform]
    restart: unless-stopped
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=256MB
        -c effective_cache_size=1GB

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:latest
    container_name: nexusguard-redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks: [platform]
    restart: unless-stopped

  # ── OPA Policy Engine (disabled for dev) ─────────────────────────────────────
  # opa:
  #   image: openpolicyagent/opa:latest
  #   container_name: nexusguard-opa
  #   command: run --server --addr=0.0.0.0:8181 --log-level=info /policies
  #   ports:
  #     - "8181:8181"
  #   volumes:
  #     - ./infrastructure/opa/policies:/policies
  #   networks: [platform]

  # ── Observability Stack (disabled for dev) ───────────────────────────────────
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: nexusguard-prometheus
  #   command:
  #     - "--config.file=/etc/prometheus/prometheus.yml"
  #     - "--storage.tsdb.path=/prometheus"
  #     - "--storage.tsdb.retention.time=30d"
  #     - "--web.enable-admin-api"
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
  #     - prometheus_data:/prometheus
  #   networks: [platform]

  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: nexusguard-grafana
  #   ports:
  #     - "3001:3000"
  #   environment:
  #     GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
  #     GF_FEATURE_TOGGLES_ENABLE: publicDashboards
  #   volumes:
  #     - grafana_data:/var/lib/grafana
  #     - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
  #     - ./observability/grafana/provisioning:/etc/grafana/provisioning
  #   depends_on: [prometheus]
  #   networks: [platform]

  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:latest
  #   container_name: nexusguard-otel
  #   command: ["--config=/etc/otel-collector-config.yaml"]
  #   volumes:
  #     - ./observability/otel/collector-config.yaml:/etc/otel-collector-config.yaml
  #   ports:
  #     - "4317:4317"
  #     - "4318:4318"
  #     - "8889:8889"
  #   networks: [platform]

  # ── Ollama (local LLM — optional) ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: nexusguard-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks: [platform]
    profiles: [ai-local]

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  ollama_data:

networks:
  platform:
    name: nexusguard-platform
    driver: bridge
